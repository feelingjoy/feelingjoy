<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEELING JOY | Official Artist Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #1DB954; /* Spotify Green for energy */
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            background: radial-gradient(circle at top right, #1a1a1a, #0a0a0a);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        /* Profile Section */
        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-color);
            padding: 5px;
            margin-bottom: 20px;
        }

        .name-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 5px;
        }

        .name-container h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .verify-badge {
            color: #3897f0;
            font-size: 18px;
        }

        .tagline {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .about {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #ddd;
        }

        /* Links Section */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            padding: 15px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .link-item i {
            font-size: 20px;
            width: 30px;
            margin-right: 15px;
        }

        .link-item:hover {
            background: var(--accent-color);
            transform: translateY(-3px);
            border-color: transparent;
        }

        /* Platform specific colors on hover (Optional) */
        .yt:hover { background: #FF0000; }
        .spot:hover { background: #1DB954; }
        .apple:hover { background: #FA243C; }
        .ig:hover { background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); }
        .fb:hover { background: #1877F2; }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-card">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgrn_UOaM66pjG71MKxAW_r2QUO-ie_1fMbv8fn3Pv95bYBJBl-gialHXzXxTQivjeJmLPs1RAM2HMwo-CpOEYmuCbLIHImRKZLy1bSdv68_rrkWra9r86oyPQybstX7HsmnonEsmTzDrP3VRnzrT6ggftJZZN2XHeaRfRNg0jpGOQduHavOeeKYqbmIlqN/s16000/18227.png" alt="FEELING JOY" class="profile-img">

            <div class="name-container">
                <h1>FEELING JOY</h1>
                <i class="fas fa-check-circle verify-badge" title="Verified Artist"></i>
            </div>
            <p class="tagline">Writer | Composer</p>

            <p class="about">
                Born in 1999. Dedicated to creating music that resonates. 
                Expressing emotions through lyrics and rhythms.
            </p>

            <div class="links-wrapper">
                <a href="https://music.youtube.com/channel/UCZHv80xS1WdJA7_iewvOy-w" class="link-item yt" target="_blank">
                    <i class="fab fa-youtube"></i> YouTube Music
                </a>
                <a href="https://open.spotify.com/artist/6WHHDHGQu5IxDG32UZ8ug9?si=_c2D6otuRX6mOgYPicZSAA" class="link-item spot" target="_blank">
                    <i class="fab fa-spotify"></i> Spotify
                </a>
                <a href="https://music.apple.com/au/artist/feeling-joy/1727533283" class="link-item apple" target="_blank">
                    <i class="fab fa-apple"></i> Apple Music
                </a>
                <a href="https://www.saavn.com/s/artist/feeling-joy-albums/e4wBIn0DC9k_" class="link-item" style="background: rgba(43, 182, 115, 0.1);" target="_blank">
                    <i class="fas fa-music"></i> JioSaavn
                </a>
                <a href="https://youtube.com/@feeling-joy/" class="link-item yt" target="_blank">
                    <i class="fab fa-youtube"></i> YouTube Channel
                </a>
                <a href="https://www.instagram.com/feeling.joy/" class="link-item ig" target="_blank">
                    <i class="fab fa-instagram"></i> Instagram
                </a>
                <a href="https://www.facebook.com/FEELING.JOYY/" class="link-item fb" target="_blank">
                    <i class="fab fa-facebook"></i> Facebook
                </a>
            </div>
        </div>

        <div class="footer">
            © 2026 FEELING JOY. All Rights Reserved.
        </div>
    </div>

</body>
</html>
