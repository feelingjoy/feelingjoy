<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEELING JOY | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --blur: blur(20px); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: #000; color: #fff; min-height: 100vh; }

        /* Smooth Loading Animation */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; animation: fadeOut 1s ease 1s forwards; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* Full Screen Hero */
        .hero-container { position: relative; width: 100vw; height: 50vh; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; }
        .hero-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 25px; background: linear-gradient(to top, #000 0%, rgba(0,0,0,0.6) 60%, transparent 100%); }
        
        .name { font-size: 28px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .blue-tick { color: #0095f6; font-size: 18px; }
        .tagline { color: #ccc; margin-top: 5px; font-size: 15px; }

        .main-container { padding: 20px; }
        .section-title { color: #666; font-size: 12px; text-transform: uppercase; margin: 25px 0 10px 5px; letter-spacing: 1.5px; }

        /* Glassmorphic Links */
        .link-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-radius: 20px; background: var(--glass); backdrop-filter: var(--blur); border: 1px solid rgba(255,255,255,0.1); text-decoration: none; color: #fff; margin-bottom: 12px; transition: 0.3s; }
        .link-item:hover { background: rgba(255,255,255,0.15); }
        .link-left { display: flex; align-items: center; gap: 15px; font-weight: 600; }
        .play-btn { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 12px; }

        /* Footer */
        .footer { margin-top: 50px; text-align: center; padding-bottom: 30px; }
        .dev-box { display: inline-flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 50px; text-decoration: none; color: #fff; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .dev-box:hover { background: rgba(255,255,255,0.1); }
        .dev-box img { width: 30px; height: 30px; border-radius: 50%; }
    </style>
</head>
<body>

    <div id="loader"><h2>FEELING JOY</h2></div>

        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgrn_UOaM66pjG71MKxAW_r2QUO-ie_1fMbv8fn3Pv95bYBJBl-gialHXzXxTQivjeJmLPs1RAM2HMwo-CpOEYmuCbLIHImRKZLy1bSdv68_rrkWra9r86oyPQybstX7HsmnonEsmTzDrP3VRnzrT6ggftJZZN2XHeaRfRNg0jpGOQduHavOeeKYqbmIlqN/s16000/18227.png" class="hero-img">
        <div class="hero-overlay">
            <h1 class="name">FEELING JOY <i class="fas fa-check-circle blue-tick"></i></h1>
            <p class="tagline">Writer | Composer | Producer</p>
        </div>
    </div>

    <main class="main-container">
        <div class="section-title">Socials & Contact</div>
        <a href="https://www.instagram.com/feeling.joy/" class="link-item"><div class="link-left"><i class="fab fa-instagram" style="color:#E1306C"></i> Instagram</div></a>
        <a href="https://www.facebook.com/FEELING.JOYY/" class="link-item"><div class="link-left"><i class="fab fa-facebook" style="color:#1877F2"></i> Facebook</div></a>
        <a href="mailto:feelingjoy.official@gmail.com" class="link-item"><div class="link-left"><i class="fas fa-envelope" style="color:#fbbc05"></i> Mail Me</div></a>

        <div class="section-title">Music Stores</div>
        <a href="https://open.spotify.com/artist/6WHHDHGQu5IxDG32UZ8ug9" class="link-item">
            <div class="link-left"><i class="fab fa-spotify" style="color:#1DB954"></i> Spotify</div>
            <div class="play-btn"><i class="fas fa-play"></i></div>

        <a href="https://music.youtube.com/channel/UCZHv80xS1WdJA7_iewvOy-w" class="link-item">

</body>
</html>
