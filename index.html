<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>FEELING JOY | Official Artist</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --blur: blur(20px); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: #000; color: #fff; min-height: 100vh; }

        /* Loader */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; animation: fadeOut 1s ease 1s forwards; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* Hero */
        .hero { width: 100%; height: 50vh; background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgrn_UOaM66pjG71MKxAW_r2QUO-ie_1fMbv8fn3Pv95bYBJBl-gialHXzXxTQivjeJmLPs1RAM2HMwo-CpOEYmuCbLIHImRKZLy1bSdv68_rrkWra9r86oyPQybstX7HsmnonEsmTzDrP3VRnzrT6ggftJZZN2XHeaRfRNg0jpGOQduHavOeeKYqbmIlqN/s16000/18227.png') center/cover; }
        
        .main-container { padding: 20px; margin-top: -50px; }
        .profile-info { margin-bottom: 25px; }
        .name { font-size: 28px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .blue-tick { color: #0095f6; font-size: 18px; }
        .tagline { font-size: 15px; color: #a1a1a6; margin: 5px 0; }
        .about { font-size: 14px; color: #888; line-height: 1.5; }

        /* Links */
        .link-group { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; }
        .link-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-radius: 16px; background: var(--glass); backdrop-filter: var(--blur); border: 1px solid rgba(255,255,255,0.1); text-decoration: none; color: #fff; }
        .link-left { display: flex; align-items: center; gap: 14px; font-weight: 600; }

        /* Footer */
        .footer { margin-top: 40px; text-align: center; padding-bottom: 30px; }
        .dev-box { display: inline-flex; align-items: center; gap: 10px; background: var(--glass); padding: 8px 15px; border-radius: 50px; text-decoration: none; color: #fff; }
        .dev-box img { width: 30px; height: 30px; border-radius: 50%; }
        .dev-box span { font-size: 12px; }
    </style>
</head>
<body>

    <div id="loader"><div style="font-weight:800; letter-spacing:4px;">FEELING JOY</div></div>

            <a href="https://music.youtube.com/channel/UCZHv80xS1WdJA7_iewvOy-w" class="link-item"><div class="link-left"><i class="fab fa-youtube" style="color:#FF0000"></i> YouTube Music</div><i class="fas fa-chevron-right"></i></a>

            <a href="https://www.facebook.com/FEELING.JOYY/" class="link-item"><div class="link-left"><i class="fab fa-facebook" style="color:#1877F2"></i> Facebook</div><i class="fas fa-chevron-right"></i></a>
            <a href="mailto:feelingjoy.official@gmail.com" class="link-item"><div class="link-left"><i class="fas fa-envelope" style="color:#fbbc05"></i> Mail Me</div><i class="fas fa-chevron-right"></i></a>

</body>
</html>
