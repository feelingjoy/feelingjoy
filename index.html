<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEELING JOY | Official Artist</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #000; color: #fff; min-height: 100vh; }

        /* Loader */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; animation: fadeOut 1.5s ease 1s forwards; }
        .shimmer { font-size: 28px; font-weight: 800; background: linear-gradient(90deg, #444, #fff, #444); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 2s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* Hero */
        .hero-container { position: relative; width: 100%; aspect-ratio: 16 / 9; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, #000 0%, rgba(0,0,0,0.3) 50%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 30px; }
        
        .name { font-size: 28px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .blue-tick { color: #0095f6; font-size: 18px; }
        .tagline { color: #ccc; margin-top: 5px; font-size: 14px; }

        .main-container { padding: 20px; }
        .about-section { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .about-section p { font-size: 14px; color: #ddd; line-height: 1.5; }

        .section-title { color: #555; font-size: 12px; text-transform: uppercase; margin: 20px 0 10px 5px; }

        /* Glowing Border Links */
        .link-item { position: relative; display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-radius: 20px; background: rgba(255,255,255,0.03); margin-bottom: 12px; text-decoration: none; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .link-item::before { content: ""; position: absolute; inset: -1px; border-radius: 20px; padding: 1px; background: linear-gradient(45deg, #333, #fff, #333); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite: exclude; animation: rotate 3s linear infinite; }
        @keyframes rotate { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }

        .link-left { display: flex; align-items: center; gap: 15px; font-weight: 600; }
        .play-btn { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; }

        .footer { margin: 40px 0; text-align: center; }
        .dev-box { display: inline-flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 50px; text-decoration: none; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .dev-box img { width: 28px; height: 28px; border-radius: 50%; }
    </style>
</head>
