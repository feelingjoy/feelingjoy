<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEELING JOY | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background-color: #000; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Loading Animation */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; animation: fadeOut 1s ease 1s forwards; }
        .loader-text { font-size: 20px; font-weight: 700; letter-spacing: 3px; color: #fff; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* Hero Area */
        .hero { width: 100%; height: 50vh; background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgrn_UOaM66pjG71MKxAW_r2QUO-ie_1fMbv8fn3Pv95bYBJBl-gialHXzXxTQivjeJmLPs1RAM2HMwo-CpOEYmuCbLIHImRKZLy1bSdv68_rrkWra9r86oyPQybstX7HsmnonEsmTzDrP3VRnzrT6ggftJZZN2XHeaRfRNg0jpGOQduHavOeeKYqbmIlqN/s16000/18227.png') center/cover no-repeat; }
        
        .content { padding: 30px 20px; flex: 1; }
        .name-box { margin-bottom: 30px; }
        .name-box h1 { font-size: 32px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .blue-tick { color: #0095f6; font-size: 20px; }
        .tagline { color: #666; margin-top: 5px; }

        /* Links */
        .link-item { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-radius: 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); text-decoration: none; color: #fff; margin-bottom: 12px; transition: 0.3s; }
        .link-item:hover { background: rgba(255,255,255,0.1); }
        .link-left { display: flex; align-items: center; gap: 15px; font-weight: 600; }

        /* Footer Credit */
        .footer { margin-top: 50px; text-align: center; padding-bottom: 30px; }
        .dev-box { display: inline-flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 50px; text-decoration: none; color: #fff; }
        .dev-box img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
        .dev-box span { font-size: 12px; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="loader"><div class="loader-text">FEELING JOY</div></div>

    <header class="hero"></header>

    <main class="content">
        <div class="name-box">
            <h1>FEELING JOY <i class="fas fa-check-circle blue-tick"></i></h1>
            <p class="tagline">Writer | Composer | Producer</p>
        </div>

        <a href="https://open.spotify.com/artist/6WHHDHGQu5IxDG32UZ8ug9" class="link-item">
            <div class="link-left"><i class="fab fa-spotify" style="color: #1DB954;"></i> Spotify</div>
            <i class="fas fa-chevron-right" style="opacity: 0.5;"></i>
        </a>
        
        <a href="https://music.youtube.com/channel/UCZHv80xS1WdJA7_iewvOy-w" class="link-item">
            <div class="link-left"><i class="fab fa-youtube" style="color: #FF0000;"></i> YouTube Music</div>
            <i class="fas fa-chevron-right" style="opacity: 0.5;"></i>
        </a>

        <a href="mailto:feelingjoy.official@gmail.com" class="link-item">
            <div class="link-left"><i class="fas fa-envelope" style="color: #fbbc05;"></i> Email Me</div>
            <i class="fas fa-chevron-right" style="opacity: 0.5;"></i>
        </a>

        <div class="footer">
            <a href="https://techaddicted.in" class="dev-box">
                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgrn_UOaM66pjG71MKxAW_r2QUO-ie_1fMbv8fn3Pv95bYBJBl-gialHXzXxTQivjeJmLPs1RAM2HMwo-CpOEYmuCbLIHImRKZLy1bSdv68_rrkWra9r86oyPQybstX7HsmnonEsmTzDrP3VRnzrT6ggftJZZN2XHeaRfRNg0jpGOQduHavOeeKYqbmIlqN/s16000/18227.png">
                <span>Coded by Tech Addicted</span>
            </a>
        </div>
    </main>

</body>
</html>
