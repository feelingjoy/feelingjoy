<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEELING JOY | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #000; color: #fff; min-height: 100vh; }

        /* Shining Text Loader */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; animation: fadeOut 1.5s ease 1s forwards; }
        .shimmer { font-size: 28px; font-weight: 800; background: linear-gradient(90deg, #444, #fff, #444); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 2s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* Hero Image with Smooth Blend */
        .hero-container { position: relative; width: 100%; aspect-ratio: 16 / 9; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, #000 0%, rgba(0,0,0,0.2) 60%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 30px; }
        
        .name { font-size: 30px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .blue-tick { color: #0095f6; font-size: 20px; }
        .tagline { color: #aaa; margin-top: 5px; }

        .main-container { padding: 20px; }

        /* Shining Border Links */
        .link-item { 
            position: relative; display: flex; align-items: center; justify-content: space-between; 
            padding: 18px 22px; border-radius: 20px; background: var(--glass); 
            margin-bottom: 15px; text-decoration: none; color: #fff;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .link-item::before {
            content: ""; position: absolute; inset: -1px; border-radius: 20px;
            padding: 1px; background: linear-gradient(45deg, #000, #444, #000);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            animation: borderRotate 4s linear infinite;
        }
        @keyframes borderRotate { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }

        .link-left { display: flex; align-items: center; gap: 15px; font-weight: 600; }
        .play-btn { width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; }
        
        .footer { margin: 40px 0; text-align: center; }
        .dev-box { display: inline-flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 50px; text-decoration: none; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .dev-box img { width: 28px; height: 28px; border-radius: 50%; }
    </style>
</head>
<body>

    <div id="loader"><div class="shimmer">FEELING JOY</div></div>

    <div class="hero-container">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgrn_UOaM66pjG71MKxAW_r2QUO-ie_1fMbv8fn3Pv95bYBJBl-gialHXzXxTQivjeJmLPs1RAM2HMwo-CpOEYmuCbLIHImRKZLy1bSdv68_rrkWra9r86oyPQybstX7HsmnonEsmTzDrP3VRnzrT6ggftJZZN2XHeaRfRNg0jpGOQduHavOeeKYqbmIlqN/s16000/18227.png" class="hero-img">
        <div class="hero-overlay">
            <h1 class="name">FEELING JOY <i class="fas fa-check-circle blue-tick"></i></h1>
            <p class="tagline">Writer | Composer | Producer</p>
        </div>
    </div>

    <main class="main-container">
        <!-- Links -->
        <a href="https://open.spotify.com/artist/6WHHDHGQu5IxDG32UZ8ug9" class="link-item">
            <div class="link-left"><i class="fab fa-spotify" style="color:#1DB954"></i> Spotify</div>
            <div class="play-btn"><i class="fas fa-play" style="font-size: 10px;"></i></div>
        </a>
        <a href="https://music.youtube.com/channel/UCZHv80xS1WdJA7_iewvOy-w" class="link-item">
            <div class="link-left"><i class="fab fa-youtube-music" style="color:#FF0000"></i> YouTube Music</div>
            <div class="play-btn"><i class="fas fa-play" style="font-size: 10px;"></i></div>
        </a>
        <a href="https://youtube.com/@feeling-joy/" class="link-item">
            <div class="link-left"><i class="fab fa-youtube" style="color:#FF0000"></i> YouTube</div>
            <div class="play-btn"><i class="fas fa-play" style="font-size: 10px;"></i></div>
        </a>
        <a href="mailto:feelingjoy.official@gmail.com" class="link-item">
            <div class="link-left"><i class="fas fa-envelope" style="color:#fbbc05"></i> Mail Me</div>
            <div class="play-btn"><i class="fas fa-arrow-right" style="font-size: 10px;"></i></div>
        </a>

        <footer class="footer">
            <a href="https://techaddicted.in" class="dev-box">
                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgrn_UOaM66pjG71MKxAW_r2QUO-ie_1fMbv8fn3Pv95bYBJBl-gialHXzXxTQivjeJmLPs1RAM2HMwo-CpOEYmuCbLIHImRKZLy1bSdv68_rrkWra9r86oyPQybstX7HsmnonEsmTzDrP3VRnzrT6ggftJZZN2XHeaRfRNg0jpGOQduHavOeeKYqbmIlqN/s16000/18227.png">
                <span>Coded by Tech Addicted</span>
            </a>
        </footer>
    </main>
</body>
</html>
